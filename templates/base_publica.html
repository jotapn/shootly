<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shootly{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Lato:wght@400;700&family=Raleway:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --cor-primaria:   {{ perfil.cor_primaria|default:"#1d4ed8" }};
            --cor-secundaria: {{ perfil.cor_secundaria|default:"#64748b" }};
            --fonte-titulo:   '{{ perfil.fonte_titulo|default:"Inter" }}', sans-serif;
        }
        .bg-primaria    { background-color: var(--cor-primaria);   }
        .text-primaria  { color:            var(--cor-primaria);   }
        .border-primaria{ border-color:     var(--cor-primaria);   }
        .ring-primaria  { --tw-ring-color:  var(--cor-primaria);   }
        .bg-secundaria  { background-color: var(--cor-secundaria); }
        .text-secundaria{ color:            var(--cor-secundaria); }
        .font-titulo, h1, h2, h3 { font-family: var(--fonte-titulo); }
        a { color: var(--cor-primaria); }
        main { border-top: 4px solid var(--cor-secundaria); }

        {% if perfil and perfil.tema == 'dark' %}
        body   { background-color: #111827 !important; color: #f9fafb !important; }
        header { box-shadow: inset 0 -4px 0 var(--cor-secundaria); }
        .rounded-xl, .rounded-lg { background-color: #1f2937 !important; border-color: #374151 !important; }
        .text-slate-900, .text-slate-700, .text-slate-600, .text-slate-500 { color: #d1d5db !important; }
        .text-slate-400 { color: #9ca3af !important; }
        .bg-slate-50, .bg-slate-100 { background-color: #374151 !important; }
        .border-slate-200, .border-slate-100 { border-color: #374151 !important; }
        {% elif perfil and perfil.tema == 'custom' %}
        body { background-color: #f8fafc !important; }
        header { box-shadow: inset 0 -4px 0 var(--cor-secundaria); }
        main { border-top-color: var(--cor-secundaria); }
        .rounded-xl, .rounded-lg { border-color: var(--cor-secundaria); }
        {% endif %}
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-50" oncontextmenu="return false">

<header class="px-6 py-4" style="background-color: var(--cor-primaria);">
    <div class="max-w-5xl mx-auto flex items-center gap-3">
        {% if perfil and perfil.logo %}
        <img src="{{ perfil.logo.url }}" alt="Logo" class="h-10 object-contain">
        {% endif %}
        {% if perfil and perfil.nome_empresa %}
        <span class="text-xl font-bold text-white font-titulo">{{ perfil.nome_empresa }}</span>
        {% else %}
        <span class="text-xl font-bold text-white">Shootly</span>
        {% endif %}
        <div class="ml-auto">{% block header_actions %}{% endblock %}</div>
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
</main>

</body>
</html>
