{% extends "dashboard_base.html" %}

{% block title %}Editar Job{% endblock %}
{% block page_title %}Editar Job{% endblock %}

{% block content %}
<div class="max-w-sm">
    <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-4">
                <label for="{{ form.titulo.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">
                    Título do job
                </label>
                {{ form.titulo }}
                {% for error in form.titulo.errors %}
                    <p class="mt-1 text-xs text-red-600">{{ error }}</p>
                {% endfor %}
            </div>
            <div class="flex items-center gap-3 mt-6">
                <button type="submit"
                        class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 transition-colors">
                    Salvar
                </button>
                <a href="{% url 'jobs:detail' object.pk %}"
                   class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
