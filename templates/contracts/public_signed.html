<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrato assinado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
<div class="mx-auto max-w-md text-center">
    <div class="rounded-xl border border-slate-200 bg-white p-10 shadow-sm">
        <div class="flex justify-center mb-4">
            <div class="rounded-full bg-green-100 p-4">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
        </div>
        <h1 class="text-xl font-bold text-slate-900 mb-2">Contrato assinado!</h1>
        <p class="text-slate-500 text-sm">
            Obrigado, <strong>{{ contrato.assinatura_nome }}</strong>. Seu contrato foi assinado com sucesso em
            {{ contrato.assinatura_data|date:"d/m/Y \à\s H:i" }}.
        </p>
        <p class="text-xs text-slate-400 mt-4">
            Hash do documento: <span class="font-mono">{{ contrato.hash_documento|truncatechars:20 }}…</span>
        </p>
    </div>
</div>
</body>
</html>
